<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK12 JTK Selection Assessment</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root{
    --paper:#f7f5ef;
    --ink:#1c2333;
    --rule:#c9c2ae;
    --indigo:#2c3a63;
    --indigo-dk:#1a2340;
    --amber:#b5792b;
    --danger:#a5322a;
    --good:#3c6e47;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, rgba(44,58,99,0.05) 0px, rgba(44,58,99,0.05) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, rgba(44,58,99,0.05) 0px, rgba(44,58,99,0.05) 1px, transparent 1px, transparent 28px),
      var(--paper);
    color:var(--ink);
    font-family: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    min-height:100vh;
  }
  .mono{ font-family:"SF Mono","Cascadia Code",Consolas,Menlo,monospace; }
  #app{ max-width:980px; margin:0 auto; padding:24px 18px 80px; }

  /* ---- Entry screen ---- */
  .hero{ text-align:center; padding:40px 10px 20px; }
  .hero .eyebrow{ font-family:"SF Mono",Consolas,monospace; letter-spacing:.12em; text-transform:uppercase; font-size:12px; color:var(--indigo); opacity:.75; }
  .hero h1{ font-size:32px; margin:10px 0 4px; color:var(--indigo-dk); }
  .hero p.sub{ color:#555; font-size:15px; margin-top:2px;}
  .signature{ width:56px; height:56px; margin:14px auto 0; }
  .signature svg{ width:100%; height:100%; }
  .entrywrap{ max-width:640px; margin:0 auto; }

  .card{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    padding:26px;
    margin-top:22px;
  }
  label.field-label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--indigo); margin-bottom:6px; font-family:"SF Mono",Consolas,monospace;}
  input[type=text]{
    width:100%; padding:11px 12px; font-size:16px; border:1px solid var(--rule); border-radius:2px;
    font-family: inherit; background:#fffdf9; margin-bottom:18px;
  }
  input[type=text]:focus{ outline:2px solid var(--indigo); outline-offset:1px; }
  .btn{
    display:inline-block; background:var(--indigo); color:#fff; border:none;
    padding:13px 26px; font-size:15px; border-radius:2px; cursor:pointer;
    font-family:"SF Mono",Consolas,monospace; letter-spacing:.03em;
    transition: background .15s ease;
  }
  .btn:hover{ background:var(--indigo-dk); }
  .btn:disabled{ background:#999; cursor:not-allowed; }
  .btn.secondary{ background:transparent; color:var(--indigo); border:1px solid var(--indigo); }
  .btn.secondary:hover{ background:rgba(44,58,99,0.06); }
  .btn.small{ padding:9px 16px; font-size:13px; }

  ul.rules{ padding-left:20px; color:#3a3a3a; font-size:14.5px; line-height:1.7;}
  ul.rules li strong{ color:var(--indigo-dk); }

  .streamgroup{ margin-bottom:18px; display:flex; flex-direction:column; gap:6px; }
  .streamopt{
    display:flex; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--rule);
    border-radius:2px; cursor:pointer; font-size:14.5px; background:#fffdf9;
  }
  .streamopt:hover{ background:#f3efe3; }
  .streamopt input{ margin:0; }

  /* ---- Sticky bar ---- */
  #stickybar{
    position:sticky; top:0; z-index:50;
    background:var(--indigo-dk); color:#f2efe6;
    padding:12px 18px; display:flex; align-items:center; justify-content:space-between;
    font-family:"SF Mono",Consolas,monospace; font-size:14px;
    border-bottom:3px solid var(--amber);
    margin:0 -18px 18px;
  }
  #stickybar .timer{ font-size:20px; letter-spacing:.04em; }
  #stickybar .timer.warn{ color:#ffd28a; }
  #stickybar .timer.danger{ color:#ff9a8a; animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.55;} }
  #stickybar .progress{ opacity:.85; }
  #stickybar .submitbtn{ padding:8px 16px; font-size:13px; }

  /* ---- layout: main + sidebar ---- */
  .layout{ display:flex; gap:24px; align-items:flex-start; }
  .quizmain{ flex:1; min-width:0; }
  .sidebar{
    width:216px; flex-shrink:0; position:sticky; top:76px;
    background:var(--card); border:1px solid var(--rule); padding:16px; border-radius:2px;
  }
  .sidebar h3{ margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--indigo); font-family:"SF Mono",Consolas,monospace; }
  .qgrid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .qbox{
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--rule); border-radius:3px; font-family:"SF Mono",Consolas,monospace;
    font-size:12px; cursor:pointer; background:#fffdf9; color:var(--ink); user-select:none;
    transition: transform .1s ease;
  }
  .qbox:hover{ transform:scale(1.08); }
  .qbox.answered{ background:var(--good); color:#fff; border-color:var(--good); }
  .qbox.currentpage{ outline:2px solid var(--indigo); outline-offset:1px; }
  .qbox.work::after{ content:"\00b7"; }
  .legend{ margin-top:12px; font-size:11.5px; color:#666; line-height:1.9; }
  .legend .sw{ display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:6px; vertical-align:middle; border:1px solid var(--rule); }
  .legend .sw.g{ background:var(--good); border-color:var(--good); }

  .pageheader{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;
    font-family:"SF Mono",Consolas,monospace; font-size:12.5px; color:#8a7f66; text-transform:uppercase; letter-spacing:.06em;
  }
  .pageheader strong{ color:var(--indigo-dk); font-size:14px; }

  /* ---- Question cards ---- */
  .qcard{
    background:var(--card); border:1px solid var(--rule); border-radius:2px;
    padding:22px; margin:0 0 16px;
    scroll-margin-top:80px;
  }
  .qcard.unanswered{ border-left:4px solid var(--amber); }
  .qcard.highlight-flash{ animation: flashHighlight 1.6s ease; }
  @keyframes flashHighlight{ 0%{ box-shadow:0 0 0 4px var(--amber); } 100%{ box-shadow:0 0 0 0 rgba(0,0,0,0); } }
  .qheader{ margin-bottom:12px; }
  .qnum{
    display:block; font-family:"Iowan Old Style",Georgia,serif; font-weight:700;
    font-size:16px; color:var(--indigo-dk); letter-spacing:.01em;
  }
  .reqtag{
    display:inline-block; margin-top:5px; background:#f6dfd4; color:var(--danger);
    font-family:"SF Mono",Consolas,monospace; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    padding:3px 8px; border-radius:2px; font-weight:700;
  }
  .qtext{ font-size:16.5px; line-height:1.8; margin-bottom:14px; }
  .qtext .katex{ font-size:1.08em; }
  .opt{
    display:flex; align-items:flex-start; gap:10px; padding:9px 10px; border-radius:2px;
    cursor:pointer; margin-bottom:4px;
  }
  .opt:hover{ background:#f3efe3; }
  .opt input{ margin-top:5px; flex-shrink:0; }
  .opt .lbl{ font-family:"SF Mono",Consolas,monospace; font-weight:700; color:var(--indigo); margin-right:2px;}
  .opt .opttext{ line-height:1.6; }
  .worksection{ margin-top:16px; padding-top:14px; border-top:1px dashed var(--rule); }
  .worksection .req{ color:var(--danger); font-weight:700; }
  .worksection p{ font-size:13.5px; color:#555; margin:0 0 8px;}
  .thumbs{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .thumbs .thumb{ position:relative; width:74px; height:74px; border:1px solid var(--rule); border-radius:2px; overflow:hidden; }
  .thumbs .thumb img{ width:100%; height:100%; object-fit:cover; }
  .thumbs .thumb button{
    position:absolute; top:2px; right:2px; background:rgba(0,0,0,.6); color:#fff; border:none;
    width:18px; height:18px; font-size:11px; border-radius:50%; cursor:pointer; line-height:1;
  }
  input[type=file]{ font-size:13px; }

  .pagenav{ display:flex; justify-content:space-between; align-items:center; margin-top:22px; }
  .pagenav .dots{ font-family:"SF Mono",Consolas,monospace; font-size:12.5px; color:#8a7f66; }

  /* ---- overlay ---- */
  #lockOverlay{
    position:fixed; inset:0; background:rgba(20,24,40,.92); color:#f2efe6;
    display:none; align-items:center; justify-content:center; z-index:200; text-align:center; padding:20px;
    font-family:"SF Mono",Consolas,monospace;
  }
  #lockOverlay h2{ font-family:"Iowan Old Style",Georgia,serif; font-size:28px; }

  /* ---- results ---- */
  .score{ font-size:46px; color:var(--indigo-dk); font-family:"SF Mono",Consolas,monospace; }
  .warnbox{ background:#fbeee0; border:1px solid #e0bf8f; color:#6b4a1a; padding:12px 14px; border-radius:2px; font-size:13.5px; margin:14px 0; }
  footer.note{ text-align:center; font-size:12px; color:#8a8a8a; margin-top:40px; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; }
    .sidebar{ width:100%; position:static; order:-1; }
    .qgrid{ grid-template-columns:repeat(10,1fr); }
  }
</style>
</head>
<body>
<div id="lockOverlay">
  <div>
    <h2>Time's up</h2>
    <p>Your assessment has been locked and submitted automatically.</p>
  </div>
</div>
<div id="app"></div>

<script>
/* =====================================================================
   QUESTION BANK — 50 questions.
   needsWork: true (10 of them) => candidate must attach a photo of their
   working. Pages are built so each page's LAST question is a needsWork one.
   All maths is written in LaTeX (rendered by KaTeX) between $ ... $.
   ===================================================================== */
const QUESTION_BANK_A = [
{id:1,q:"Is zero a rational number?",opts:["No, zero is irrational.","Yes, since $0 = \\dfrac{0}{1}$, where $0$ and $1$ are integers and $1 \\neq 0$.","No, zero is undefined.","Yes, but only when treated as a natural number."],ans:1,needsWork:false},
{id:2,q:"Which of the following statements is FALSE?",opts:["Every natural number is a whole number.","Every integer is a whole number.","Every rational number is a real number.","Every irrational number is a real number."],ans:1,needsWork:false},
{id:3,q:"Evaluate $(0.01)^{-\\frac{1}{2}}$ without using a calculator.",opts:["$0.1$","$10$","$100$","$-10$"],ans:1,needsWork:false},
{id:4,q:"Evaluate $(0.008)^{\\frac{2}{3}}$ without using a calculator.",opts:["$0.04$","$0.4$","$0.2$","$0.008$"],ans:0,needsWork:true},
{id:5,q:"Evaluate $\\left(-\\dfrac{1}{5}\\right)^{-3}$ without using a calculator.",opts:["$-\\dfrac{1}{125}$","$\\dfrac{1}{125}$","$-125$","$125$"],ans:2,needsWork:false},
{id:6,q:"Simplify $\\dfrac{(2x^3y^{-4})^2}{8xy^{-6}}$.",opts:["$\\dfrac{x^5}{2y^2}$","$\\dfrac{x^2}{2y^5}$","$\\dfrac{2x^5}{y^2}$","$\\dfrac{x^5}{4y^2}$"],ans:0,needsWork:false},
{id:7,q:"Simplify $\\sqrt{\\dfrac{3}{5}} \\cdot \\sqrt{\\dfrac{75}{27}}$.",opts:["$\\dfrac{\\sqrt{15}}{3}$","$\\dfrac{5}{3}$","$\\dfrac{\\sqrt{5}}{3}$","$\\dfrac{15}{3}$"],ans:0,needsWork:false},
{id:8,q:"Evaluate $\\log_3\\left(27\\sqrt{3}\\right)$.",opts:["$3$","$\\dfrac{7}{2}$","$4$","$\\dfrac{9}{2}$"],ans:1,needsWork:false},
{id:9,q:"Evaluate $\\log_{0.5}(0.0625)$.",opts:["$2$","$-4$","$4$","$-2$"],ans:2,needsWork:false},
{id:10,q:"Solve $5^{x-2} = 625$.",opts:["$x = 2$","$x = 4$","$x = 6$","$x = 8$"],ans:2,needsWork:true},
{id:11,q:"When a function undergoes both a reflection and a shift, what is the correct order of operations?",opts:["Shift first, then reflect.","Reflect first, then shift.","Either order gives the same final graph.","Reflection and shifting cannot be combined."],ans:1,needsWork:false},
{id:12,q:"Given $y=f(x)$ with range $(-4, 6]$, what is the range of $g(x) = -f(x)$?",opts:["$(-4, 6]$","$[-6, 4)$","$(-6, 4]$","$[4, -6)$"],ans:1,needsWork:false},
{id:13,q:"$f(x) = 3x$ is reflected about the $x$-axis, shifted right $2$ units, then downward $3$ units. Find $g(x)$.",opts:["$g(x) = -3x + 3$","$g(x) = -3x - 3$","$g(x) = 3x - 9$","$g(x) = -3(x + 2) - 3$"],ans:0,needsWork:true},
{id:14,q:"$f(x) = \\dfrac{1}{2}x^2$ is reflected about the $x$-axis, shifted left $1$ unit, then upward $2$ units. Find $g(x)$.",opts:["$g(x) = -\\dfrac{1}{2}(x - 1)^2 + 2$","$g(x) = -\\dfrac{1}{2}(x + 1)^2 + 2$","$g(x) = \\dfrac{1}{2}(x + 1)^2 - 2$","$g(x) = -\\dfrac{1}{2}(x + 1)^2 - 2$"],ans:1,needsWork:false},
{id:15,q:"$f(x) = 3x^2$ is shifted right $2$ units, then downward $1$ unit. Find $g(x)$.",opts:["$g(x) = 3x^2 - 12x + 11$","$g(x) = 3x^2 + 12x + 11$","$g(x) = 3x^2 - 12x + 13$","$g(x) = 3(x - 2)^2 + 1$"],ans:0,needsWork:false},
{id:16,q:"$f(x) = \\dfrac{2}{x}$ is shifted right $2$ units, then downward $1$ unit. Find $g(x)$.",opts:["$g(x) = \\dfrac{2}{x + 2} - 1$","$g(x) = \\dfrac{2}{x - 2} + 1$","$g(x) = \\dfrac{2}{x - 2} - 1$","$g(x) = \\dfrac{2}{x - 1} - 2$"],ans:2,needsWork:false},
{id:17,q:"$f(x) = \\dfrac{3}{x}$ is reflected about one axis, shifted left $2$ units, then downward $2$ units. Find $g(x)$.",opts:["$g(x) = \\dfrac{3}{x + 2} - 2$","$g(x) = -\\dfrac{3}{x + 2} - 2$","$g(x) = -\\dfrac{3}{x - 2} - 2$","$g(x) = -\\dfrac{3}{x + 2} + 2$"],ans:1,needsWork:false},
{id:18,q:"Given $g(x) = 4x - x^2 - 2$ and $f(x) = x^2$, which transformation correctly produces $g(x)$ from $f(x)$?",opts:["Reflect about the $x$-axis, shift right $2$ units, then upward $2$ units.","Reflect about the $y$-axis, shift left $2$ units, then upward $2$ units.","Shift right $2$ units, then upward $2$ units (no reflection).","Reflect about the $x$-axis, shift left $2$ units, then downward $2$ units."],ans:0,needsWork:false},
{id:19,q:"Find the range of $p(x) = 2x^2 - 4x + 3$.",opts:["$(-\\infty, 1]$","$[1, \\infty)$","$(-\\infty, \\infty)$","$[3, \\infty)$"],ans:1,needsWork:true},
{id:20,q:"Find the domain of $k(x) = \\dfrac{2x - 4}{x - 3}$.",opts:["$\\mathbb{R} \\setminus \\{2\\}$","$\\mathbb{R} \\setminus \\{3\\}$","$\\mathbb{R} \\setminus \\{-3\\}$","$\\mathbb{R} \\setminus \\{4\\}$"],ans:1,needsWork:false},
{id:21,q:"$f(x) = \\ln x$ is shifted left $3$ units, then downward $2$ units. Find $g(x)$.",opts:["$g(x) = \\ln(x - 3) - 2$","$g(x) = \\ln(x + 3) - 2$","$g(x) = \\ln(x + 3) + 2$","$g(x) = \\ln(x) - 3 - 2$"],ans:1,needsWork:false},
{id:22,q:"$f(x) = e^{2x}$ is reflected about both axes, shifted right $1$ unit, then downward $3$ units. Find $g(x)$.",opts:["$g(x) = -e^{-2(x-1)} - 3$","$g(x) = -e^{2(x-1)} - 3$","$g(x) = e^{-2(x-1)} - 3$","$g(x) = -e^{-2(x+1)} - 3$"],ans:0,needsWork:true},
{id:23,q:"$f(x) = 2\\sqrt{2}$ is a constant function. What is its range?",opts:["$[0, \\infty)$","$\\mathbb{R}$","$\\{2\\sqrt{2}\\}$","$(0, 2\\sqrt{2}]$"],ans:2,needsWork:false},
{id:24,q:"Find the domain of $s(x) = -2 - \\ln(3 - x)$.",opts:["$(-\\infty, 3)$","$(3, \\infty)$","$(-\\infty, -3)$","$\\mathbb{R} \\setminus \\{3\\}$"],ans:0,needsWork:false},
{id:25,q:"Find the range of $r(x) = 2 - e^{-x+2}$.",opts:["$(2, \\infty)$","$(-\\infty, 2)$","$[2, \\infty)$","$\\mathbb{R}$"],ans:1,needsWork:true},
{id:26,q:"Find the $y$-intercept of $h(x) = -|2 - 2x| + 2$.",opts:["$-2$","$2$","$0$","$4$"],ans:2,needsWork:false},
{id:27,q:"Find the range of $g(x) = -5|x + 3| - 5$.",opts:["$(-\\infty, -5]$","$[-5, \\infty)$","$(-\\infty, 5]$","$\\mathbb{R}$"],ans:0,needsWork:false},
{id:28,q:"Find the $x$-intercept (to 2 d.p.) of $k(x) = 2 - e^{-3x+2}$.",opts:["$0.24$","$0.44$","$0.69$","$1.34$"],ans:1,needsWork:false},
{id:29,q:"Given $f(x) = \\dfrac{|9x|}{5x}$, what is the range of $f$?",opts:["$\\left\\{\\dfrac{9}{5}\\right\\}$","$\\left\\{-\\dfrac{9}{5}\\right\\}$","$\\left\\{\\dfrac{9}{5}, -\\dfrac{9}{5}\\right\\}$","$\\left[-\\dfrac{9}{5}, \\dfrac{9}{5}\\right]$"],ans:2,needsWork:false},
{id:30,q:"Given $k(x) = \\begin{cases} \\dfrac{2}{x-2}+2 & x<2 \\\\ 2(x-2)^2 & x\\ge 2 \\end{cases}$, find the range of $k$.",opts:["$[0, \\infty)$","$\\mathbb{R} \\setminus \\{2\\}$","$\\mathbb{R}$","$(-\\infty, 2]$"],ans:2,needsWork:false},
{id:31,q:"Given $r(x) = \\begin{cases} 6-x & x<3 \\\\ \\sqrt{x-2} & 3\\le x<6 \\\\ 5-2x & x>6 \\end{cases}$, find the range of $r$.",opts:["$(-\\infty,-7]\\cup[1,2]\\cup(3,\\infty)$","$(-\\infty,-7)\\cup[1,2]\\cup(3,\\infty)$","$\\mathbb{R}$","$[1,2]\\cup(3,\\infty)$"],ans:0,needsWork:false},
{id:32,q:"Given $f(x) = \\begin{cases} -\\sqrt{2-2x} & x<-1 \\\\ 4x+3 & x\\ge -1 \\end{cases}$ and $g(x) = \\begin{cases} x^2+1 & x\\ge 2 \\\\ -4 & x<2 \\end{cases}$, the range of $(f+g)(x)$ is:",opts:["$(-\\infty,-6)\\cup[-5,7)\\cup[16,\\infty)$","$(-\\infty,-6]\\cup[-5,7)\\cup[16,\\infty)$","$\\mathbb{R}$","$[-6, 16]$"],ans:0,needsWork:false},
{id:33,q:"Given $f(x) = \\begin{cases} 2x-1 & x\\le -3 \\\\ x^2+3 & x>-3 \\end{cases}$ and $g(x) = \\begin{cases} x^2+5 & x>1 \\\\ 3 & x\\le 1 \\end{cases}$, the range of $(g-f)(x)$ is:",opts:["$(-9,0)\\cup\\{2\\}\\cup[10,\\infty)$","$(-9,0]\\cup\\{2\\}\\cup[10,\\infty)$","$[-9,10]$","$\\mathbb{R}$"],ans:1,needsWork:false},
{id:34,q:"Given $f(x) = \\sqrt{2x+3}$ and $g(x) = x^2 - 2$, find the domain of $\\left(\\dfrac{f}{g}\\right)(x)$.",opts:["$\\left[-\\dfrac{3}{2}, \\infty\\right)$","$\\left[-\\dfrac{3}{2}, \\infty\\right) \\setminus \\{-\\sqrt{2}, \\sqrt{2}\\}$","$\\mathbb{R} \\setminus \\{-\\sqrt{2}, \\sqrt{2}\\}$","$\\left(-\\dfrac{3}{2}, \\infty\\right)$"],ans:1,needsWork:true},
{id:35,q:"Find the domain of $f(x) = 2x - \\sqrt{4x - 3}$.",opts:["$\\left[\\dfrac{3}{4}, \\infty\\right)$","$\\left(\\dfrac{3}{4}, \\infty\\right)$","$\\mathbb{R}$","$\\left[\\dfrac{4}{3}, \\infty\\right)$"],ans:0,needsWork:false},
{id:36,q:"Find the domain of $g(x) = \\dfrac{2x+3}{\\sqrt{3x+2}}$.",opts:["$\\left[-\\dfrac{2}{3}, \\infty\\right)$","$\\left(-\\dfrac{2}{3}, \\infty\\right)$","$\\mathbb{R} \\setminus \\left\\{-\\dfrac{2}{3}\\right\\}$","$\\left(-\\infty, -\\dfrac{2}{3}\\right)$"],ans:1,needsWork:false},
{id:37,q:"Find the domain of $h(x) = \\dfrac{x^2 - 4}{|x-2| - 3}$.",opts:["$\\mathbb{R} \\setminus \\{5, -1\\}$","$\\mathbb{R} \\setminus \\{2, -2\\}$","$\\mathbb{R} \\setminus \\{5\\}$","$\\mathbb{R} \\setminus \\{-1\\}$"],ans:0,needsWork:false},
{id:38,q:"Given $f(x) = 2x - 3$ and $g(x) = x^2 - 2x$, find $(f \\circ g)(x)$.",opts:["$2x^2 - 4x - 3$","$2x^2 - 4x + 3$","$4x^2 - 16x + 15$","$x^2 - 4x - 3$"],ans:0,needsWork:false},
{id:39,q:"Given $f(x) = 2x - 3$ and $g(x) = x^2 - 2x$, find $(g \\circ f)(2)$.",opts:["$27$","$-1$","$1$","$15$"],ans:1,needsWork:true},
{id:40,q:"Given $f(x) = |3 - x| + 2$ and $g(x) = 3$ (a constant function), find $(f \\circ g)(x)$.",opts:["$2$","$5$","$3$","$|3 - x| + 2$"],ans:0,needsWork:false},
{id:41,q:"Find the range of $x$ satisfying $x > 1$ and $x \\le 4$, in interval notation.",opts:["$(1, 4)$","$(1, 4]$","$[1, 4]$","$[1, 4)$"],ans:1,needsWork:false},

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function toShuffledQ(q){
  const optObjs = q.opts.map((text,i)=>({text, correct:i===q.ans}));
  return { id:q.id, needsWork:q.needsWork, q:q.q, opts: shuffle(optObjs) };
}

function buildRandomizedPages(bank){
  const needs = shuffle(bank.filter(q=>q.needsWork));   // 10 items
  const regs  = shuffle(bank.filter(q=>!q.needsWork));  // 40 items
  let pages = [];
  for(let i=0;i<NUM_PAGES;i++){
    const regGroup = regs.slice(i*4, (i+1)*4).map(toShuffledQ);
    const workQ = toShuffledQ(needs[i]);
    pages.push([...regGroup, workQ]); // work-required question is always last on the page
  }
  pages = shuffle(pages); // randomize the order the pages are presented in
  return pages;
}

  return "—";
}

function fmtTime(sec){
  sec = Math.max(0,sec);
  const m = Math.floor(sec/60).toString().padStart(2,"0");
  const s = Math.floor(sec%60).toString().padStart(2,"0");
  return m+":"+s;
}

function startTimer(){
  if(state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-state.startTime)/1000);
    state.remaining = QUIZ_DURATION_SECONDS - elapsed;
    updateStickyBar();
    if(state.remaining<=0 && !state.locked){
      lockAndSubmit(true);
    }
  },1000);
}

function updateStickyBar(){
  const bar = document.getElementById("stickybar");
  if(!bar) return;
  const t = document.getElementById("timerDisplay");
  const cls = state.remaining<=300 ? "timer danger" : state.remaining<=600 ? "timer warn" : "timer";
  t.className = cls;
  t.textContent = fmtTime(state.remaining);
  const answered = Object.keys(state.answers).length;
  document.getElementById("progressDisplay").textContent = `${answered} / 50 answered`;
}

function globalNumberFor(qid){
  return state.flatOrder.findIndex(q=>q.id===qid) + 1;
}
function pageIndexFor(qid){
  return Math.floor((globalNumberFor(qid)-1)/PAGE_SIZE);
}

    qhtml += `<div class="qcard ${isAnswered?'':'unanswered'}" data-qid="${q.id}">
      <div class="qheader">
        <span class="qnum">Question ${n}</span>
        ${q.needsWork ? '<span class="reqtag">Work required — attach a photo below</span>' : ''}
      </div>
      <div class="qtext">${q.q}</div>
      <div class="options">`;
    q.opts.forEach((opt,i)=>{
      const checked = state.answers[q.id]===i ? "checked" : "";
      qhtml += `<label class="opt">
        <input type="radio" name="q${q.id}" value="${i}" ${checked} onchange="selectAnswer(${q.id}, ${i})"/>
        <span class="opttext"><span class="lbl">${LETTERS[i]})</span> ${opt.text}</span>
      </label>`;
    });
    qhtml += `</div>`;
    if(q.needsWork){
      const imgs = state.images[q.id] || [];
      qhtml += `<div class="worksection">
        <p><span class="req">Required:</span> attach a photo of your handwritten working for this question.</p>
        <input type="file" accept="image/*" capture="environment" multiple onchange="attachImages(${q.id}, this.files)"/>
        <div class="thumbs" id="thumbs-${q.id}">
          ${imgs.map((im,i)=>`<div class="thumb"><img src="${im.dataUrl}"/><button onclick="removeImage(${q.id},${i})">&times;</button></div>`).join("")}
        </div>
      </div>`;
    }
    qhtml += `</div>`;
  });

  const html = `
    <div id="stickybar">
      <div class="timer" id="timerDisplay">${fmtTime(state.remaining)}</div>
      <div class="progress" id="progressDisplay">${answeredCount} / 50 answered</div>
      <button class="btn submitbtn" id="submitBtn">Submit Now</button>
    </div>
    <div class="layout">
      <div class="quizmain">
        <div class="pageheader">
          <strong>Page ${state.currentPage+1} of ${NUM_PAGES}</strong>
          <span>Questions ${startNum}&ndash;${endNum}</span>
        </div>
        ${qhtml}
        <div class="pagenav">
          <button class="btn secondary small" id="prevBtn" ${state.currentPage===0?'disabled':''}>&larr; Previous Page</button>
          <span class="dots">${Array.from({length:NUM_PAGES}).map((_,i)=>i===state.currentPage?'&#9679;':'&#9675;').join(' ')}</span>
          <button class="btn secondary small" id="nextBtn" ${state.currentPage===NUM_PAGES-1?'disabled':''}>Next Page &rarr;</button>
        </div>
      </div>
      ${renderSidebar()}
    </div>
  `;
  app.innerHTML = html;
  document.getElementById("submitBtn").onclick = ()=>{
    if(confirm("Submit your assessment now? You will not be able to change your answers after this.")){
      lockAndSubmit(false);
    }
  };
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if(prevBtn) prevBtn.onclick = ()=> gotoPage(state.currentPage-1);
  if(nextBtn) nextBtn.onclick = ()=> gotoPage(state.currentPage+1);
}

window.gotoPage = function(p){
  state.currentPage = Math.min(NUM_PAGES-1, Math.max(0,p));
  render();
  window.scrollTo({top:0, behavior:"smooth"});
};

window.jumpToQuestion = function(qid){
  const pIdx = pageIndexFor(qid);
  state.jumpTarget = qid;
  if(pIdx !== state.currentPage){
    state.currentPage = pIdx;
  }
  render();
};

function applyJumpTarget(){
  if(!state.jumpTarget) return;
  const qid = state.jumpTarget;
  state.jumpTarget = null;
  const el = document.querySelector(`.qcard[data-qid="${qid}"]`);
  if(el){
    el.scrollIntoView({behavior:"smooth", block:"center"});
    el.classList.add("highlight-flash");
    setTimeout(()=> el.classList.remove("highlight-flash"), 1600);
  }
}

window.selectAnswer = function(qid, idx){
  state.answers[qid] = idx;
  const card = document.querySelector(`.qcard[data-qid="${qid}"]`);
  if(card) card.classList.remove("unanswered");
  document.getElementById("progressDisplay").textContent = `${Object.keys(state.answers).length} / 50 answered`;
  const n = globalNumberFor(qid);
  const box = document.querySelector(`.qbox[data-num="${n}"]`);
  if(box) box.classList.add("answered");
};

window.attachImages = function(qid, fileList){
  if(!state.images[qid]) state.images[qid] = [];
  const files = Array.from(fileList);
  files.forEach(file=>{
    compressImage(file, 1000, 0.6).then(dataUrl=>{
      state.images[qid].push({name:file.name, dataUrl});
      renderThumbs(qid);
    }).catch(()=>{
      const reader = new FileReader();
      reader.onload = e=>{
        state.images[qid].push({name:file.name, dataUrl:e.target.result});
        renderThumbs(qid);
      };
      reader.readAsDataURL(file);
    });
  });
};

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.removeImage = function(qid, idx){
  state.images[qid].splice(idx,1);
  renderThumbs(qid);
};

function renderThumbs(qid){
  const box = document.getElementById(`thumbs-${qid}`);
  if(!box) return;
  const imgs = state.images[qid]||[];
  box.innerHTML = imgs.map((im,i)=>`<div class="thumb"><img src="${im.dataUrl}"/><button onclick="removeImage(${qid},${i})">&times;</button></div>`).join("");
}

function lockAndSubmit(auto){
  state.locked = true;
  if(state.timerHandle) clearInterval(state.timerHandle);
  window.onbeforeunload = null;
  if(auto){
    document.getElementById("lockOverlay").style.display = "flex";
    setTimeout(()=>{
      document.getElementById("lockOverlay").style.display = "none";
      state.screen = "results";
      render();
    }, 1800);
  } else {
    state.screen = "results";
    render();
  }
}

function computeResults(){
  let correct = 0, missingWork = 0, unanswered = 0;
  const rows = state.flatOrder.map((q,idx)=>{
    const sel = state.answers[q.id];
    const isCorrect = sel!==undefined && q.opts[sel].correct;
    if(isCorrect) correct++;
    if(sel===undefined) unanswered++;
    const hasWork = q.needsWork ? (state.images[q.id]||[]).length>0 : true;
    if(q.needsWork && !hasWork) missingWork++;
    return {position:idx+1, id:q.id, needsWork:q.needsWork, hasWork,
      question:q.q, selected: sel!==undefined ? LETTERS[sel]+") "+q.opts[sel].text : "(no answer)",
      correctAnswer: LETTERS[q.opts.findIndex(o=>o.correct)]+") "+q.opts.find(o=>o.correct).text,
      isCorrect};
  });
  return {correct, missingWork, unanswered, rows};
}

function renderResults(){
  const r = computeResults();
  const timeUsed = QUIZ_DURATION_SECONDS - Math.max(0,state.remaining);
  app.innerHTML = `
    <div class="entrywrap">
      <div class="hero">
        <div class="eyebrow">Assessment Complete</div>
        <h1>Results Summary</h1>
      </div>
      <div class="card" style="text-align:center;">
        <div class="score">${r.correct} / 50</div>
        <p style="color:#555;">Auto-graded MCQ score (photos of working are graded separately)</p>
        <p class="mono" style="font-size:13px;color:#888;">${state.name} &middot; ${state.matric} &middot; ${streamLabel()} &middot; time used ${fmtTime(timeUsed)}</p>
        ${r.unanswered>0 ? `<div class="warnbox">${r.unanswered} question(s) were left unanswered.</div>` : ""}
        ${r.missingWork>0 ? `<div class="warnbox">${r.missingWork} of the 10 "work required" question(s) have no photo attached.</div>` : ""}
        <button class="btn" id="downloadBtn">Download Submission Package (.zip)</button>
        <p style="font-size:12.5px;color:#777;margin-top:14px;">Submit the downloaded .zip file through the official submission channel, as instructed.</p>
        <p class="mono" id="serverStatus" style="font-size:11.5px;color:#999;margin-top:10px;">Submitting to central database&hellip;</p>
      </div>
      <footer class="note">KK12 JTK Selection Assessment</footer>
    </div>
  `;
  document.getElementById("downloadBtn").onclick = ()=> buildZipAndDownload(r);
  submitToServer(r);
}

async function submitToServer(r){
  if(state.submittedToServer) return;
  state.submittedToServer = true;
  const statusEl = document.getElementById("serverStatus");
  if(!db){
    if(statusEl) statusEl.textContent = "Central submission isn't set up yet — please use the downloaded zip.";
    return;
  }
  try{
    const submissionRef = await db.collection("submissions").add({
      name: state.name,
      matric: state.matric,
      stream: state.stream,
      streamLabel: streamLabel(),
      score: r.correct,
      unanswered: r.unanswered,
      missingWork: r.missingWork,
      timeUsedSeconds: QUIZ_DURATION_SECONDS - Math.max(0, state.remaining),
      submittedAt: new Date().toISOString(),
      rows: r.rows.map(row=>({
        position: row.position, id: row.id, question: row.question,
        selected: row.selected, correctAnswer: row.correctAnswer,
        isCorrect: row.isCorrect, needsWork: row.needsWork, hasWork: row.hasWork
      }))
    });

    const photoWrites = [];
    Object.keys(state.images).forEach(qid=>{
      (state.images[qid] || []).forEach((img, i)=>{
        photoWrites.push(db.collection("workingPhotos").add({
          submissionId: submissionRef.id,
          matric: state.matric,
          name: state.name,
          qid: qid,
          index: i+1,
          dataUrl: img.dataUrl,
          uploadedAt: new Date().toISOString()
        }));
      });
    });
    await Promise.all(photoWrites);

    if(statusEl) statusEl.textContent = "Submitted to the central database successfully.";
  }catch(err){
    console.error(err);
    if(statusEl) statusEl.textContent = "Could not reach the central database (no internet, or setup issue). Please make sure to submit your downloaded zip as backup.";
  }
}

async function buildZipAndDownload(r){
  const zip = new JSZip();
  const lines = [];
  lines.push(`KK12 JTK SELECTION ASSESSMENT — SUBMISSION`);
  lines.push(`Name: ${state.name}`);
  lines.push(`IC / Candidate No.: ${state.matric}`);
  lines.push(`Programme: ${streamLabel()}`);
  lines.push(`Score (auto-graded MCQ): ${r.correct} / 50`);
  lines.push(`Unanswered: ${r.unanswered}`);
  lines.push(`Missing working photos: ${r.missingWork}`);
  lines.push(`Submitted: ${new Date().toString()}`);
  lines.push(``);
  lines.push(`------------------------------------------------------------`);
  r.rows.forEach(row=>{
    lines.push(`Q${row.position} [Bank Ref #${row.id}]${row.needsWork ? " [WORK REQUIRED]" : ""}`);
    lines.push(`  ${row.question}`);
    lines.push(`  Your answer:    ${row.selected}`);
    lines.push(`  Correct answer: ${row.correctAnswer}`);
    lines.push(`  Result: ${row.isCorrect ? "CORRECT" : "INCORRECT"}${row.needsWork ? (row.hasWork ? " (working attached)" : " (NO WORKING ATTACHED)") : ""}`);
    lines.push(``);
  });
  zip.file("summary.txt", lines.join("\n"));

  const workFolder = zip.folder("working_photos");
  Object.keys(state.images).forEach(qid=>{
    (state.images[qid]||[]).forEach((img,i)=>{
      const base64 = img.dataUrl.split(",")[1];
      const ext = "jpg"; // images are re-encoded as JPEG during compression
      workFolder.file(`Q${qid}_${i+1}.${ext}`, base64, {base64:true});
    });
  });

  const blob = await zip.generateAsync({type:"blob"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safeId = state.matric.replace(/[^a-zA-Z0-9]/g,"");
  a.href = url;
  a.download = `${safeId}_${state.stream}_KK12JTK_Submission.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();
</script>
